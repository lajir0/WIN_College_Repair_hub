services:
  api:
    build:
      context: ./repairhub-api
      dockerfile: Dockerfile
    env_file:
      - ./repairhub-api/.env
    environment:
      DATABASE_URL: sqlite:////app/data/db.sqlite3
      CORS_ALLOWED_ORIGINS: http://localhost:8080
      FRONTEND_APP_URL: http://localhost:8080
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - repairhub_api_data:/app/data

  web:
    build:
      context: ./repairhub-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_WS_URL: /ws
        VITE_STRIPE_PUBLISHABLE_KEY: ""
    depends_on:
      - api
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  repairhub_api_data:
