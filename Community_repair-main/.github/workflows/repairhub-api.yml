name: repairhub-api

on:
  push:
    paths:
      - "repairhub-api/**"
      - ".github/workflows/repairhub-api.yml"
  pull_request:
    paths:
      - "repairhub-api/**"
      - ".github/workflows/repairhub-api.yml"

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: repairhub-api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run python manage.py check
      - run: uv run ruff check .
      - run: uv run pytest
      - run: docker build -t repairhub-api:ci .
